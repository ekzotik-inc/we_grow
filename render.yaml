# Render Blueprint для We Grow Marathon.
# Сейчас: только бесплатная PostgreSQL. Бот-воркер (требует платный план)
# добавите позже, раскомментировав блок services ниже.
#
# Как применить: Render Dashboard → New → Blueprint → выбрать этот репозиторий.

databases:
  - name: wegrow-db
    plan: free            # бесплатный тариф; апгрейд — в дашборде БД
    databaseName: wegrow
    user: wegrow

