# Render Blueprint для We Grow Marathon.
#
# Разворачивает бота как Background Worker, который подключается к УЖЕ
# существующей базе test_bd (её адрес вписывается в дашборде — DATABASE_URL).
# Отдельную базу здесь НЕ создаём: на free-тарифе Render разрешена только одна.
#
# Как применить: Render Dashboard → New + → Blueprint → выбрать этот репозиторий
# и ветку claude/laughing-babbage-2tyt1p → Apply. Затем вписать 3 секрета
# (DATABASE_URL, BOT_TOKEN, ADMIN_IDS) — см. docs/deploy-render.md.

services:
  - type: worker
    name: wegrow-bot
    runtime: python
    region: oregon            # та же зона, что и база test_bd (Oregon) — нужно для Internal URL
    plan: starter             # воркер на Render платный (free-тарифа для worker нет)
    branch: claude/laughing-babbage-2tyt1p
    buildCommand: pip install -r requirements.txt
    startCommand: python -m bot.main
    envVars:
      - key: DATABASE_URL     # Internal Database URL базы test_bd (впишете в дашборде)
        sync: false
      - key: BOT_TOKEN        # токен от @BotFather
        sync: false
      - key: ADMIN_IDS        # ваш Telegram ID (узнать: напишите @userinfobot)
        sync: false
      - key: TZ
        value: Europe/Moscow
