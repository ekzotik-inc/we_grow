<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Step Together</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root{
    /* Палитра в стиле IQOS ILUMA: слейт + бирюза + фиолетовый */
    --bg:#17151d;
    --bg2:#1f1c26;
    --card:#272430;
    --card2:#2f2b39;
    --line:#38333f;
    --tq:#00d1d2;            /* бирюза */
    --vi:#7a5cff;            /* фиолетовый */
    --coral:#ff7a59;         /* тёплый акцент */
    --gold:#ffc65c;
    --text:#f4f3f7;
    --muted:#9b96a8;
    --grad:linear-gradient(135deg,#00d1d2 0%,#7a5cff 100%);
    --grad-warm:linear-gradient(135deg,#ff7a59 0%,#ffc65c 100%);
    --safe-top:env(safe-area-inset-top,0px);
    --safe-bottom:env(safe-area-inset-bottom,0px);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;
    -webkit-user-select:none;user-select:none}
  html,body{margin:0;height:100%}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",sans-serif;
    background:
      radial-gradient(120% 60% at 100% 0%, rgba(122,92,255,.18), transparent 60%),
      radial-gradient(120% 60% at 0% 0%, rgba(0,209,210,.16), transparent 55%),
      var(--bg);
    color:var(--text);
    padding:calc(var(--safe-top) + 8px) 0 calc(84px + var(--safe-bottom)) 0;
    overflow-x:hidden;
  }
  .wrap{max-width:620px;margin:0 auto;padding:0 16px}

  /* Заголовок */
  .app-head{display:flex;align-items:center;gap:12px;padding:8px 2px 14px}
  .logo{width:42px;height:42px;border-radius:13px;background:var(--grad);
    display:grid;place-items:center;font-size:22px;box-shadow:0 6px 18px rgba(0,209,210,.28)}
  .app-head h1{font-size:18px;margin:0;font-weight:800;letter-spacing:.2px}
  .app-head p{margin:1px 0 0;font-size:12px;color:var(--muted)}

  /* Карточки */
  .card{background:linear-gradient(180deg,var(--card2),var(--card));
    border:1px solid var(--line);border-radius:20px;padding:18px;margin:12px 0;
    animation:rise .5s cubic-bezier(.2,.8,.2,1) both}
  .card.d1{animation-delay:.05s}.card.d2{animation-delay:.1s}.card.d3{animation-delay:.15s}
  @keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}

  .muted{color:var(--muted);font-size:13px}
  .row{display:flex;align-items:center;justify-content:space-between;gap:10px}

  /* Растение + прогресс */
  .hero{text-align:center;position:relative;overflow:hidden}
  .hero::after{content:"";position:absolute;inset:-40% -10% auto;height:180px;
    background:radial-gradient(60% 80% at 50% 0,rgba(0,209,210,.25),transparent 70%);pointer-events:none}
  .plant{font-size:78px;line-height:1;margin:2px 0 4px;position:relative;z-index:1;
    animation:sprout .7s cubic-bezier(.2,1.4,.4,1) both, bob 4s ease-in-out 1s infinite}
  @keyframes sprout{from{transform:scale(.3);opacity:0}to{transform:scale(1);opacity:1}}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
  .stage{font-weight:800;font-size:16px;background:var(--grad);
    -webkit-background-clip:text;background-clip:text;color:transparent}
  .bar{height:10px;border-radius:8px;background:#1b1922;overflow:hidden;margin:14px 0 8px;border:1px solid var(--line)}
  .bar>i{display:block;height:100%;width:0;border-radius:8px;background:var(--grad);
    box-shadow:0 0 12px rgba(0,209,210,.5);transition:width 1.1s cubic-bezier(.2,.8,.2,1)}

  /* Плитки статов */
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
  .tile{background:var(--bg2);border:1px solid var(--line);border-radius:16px;padding:14px 8px;text-align:center}
  .tile .n{font-size:24px;font-weight:800}
  .tile .n.tq{color:var(--tq)}.tile .n.coral{color:var(--coral)}
  .tile .l{font-size:11px;color:var(--muted);margin-top:3px}

  /* Календарь */
  .sec-title{font-weight:700;font-size:15px;display:flex;align-items:center;gap:8px}
  .cal{display:grid;grid-template-columns:repeat(7,1fr);gap:7px;margin-top:12px}
  .day{aspect-ratio:1;border-radius:12px;background:var(--bg2);border:1px solid var(--line);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    font-size:12px;font-weight:600;position:relative;transition:transform .15s}
  .day small{font-size:9px;color:var(--muted);font-weight:600}
  .day.p1{background:linear-gradient(160deg,#123f45,#0e3238);border-color:#1c5157}
  .day.p2{background:linear-gradient(160deg,#0a5f61,#08494b);border-color:#0a6d6f;color:#eafeff}
  .day.p3{background:var(--grad);border:none;color:#06222b}
  .day.pend{background:rgba(255,198,92,.12);border:1px dashed var(--gold);color:var(--gold)}
  .day.rej{background:rgba(255,90,90,.10);border:1px solid #6e3636;color:#ff9b9b}
  .day.today{outline:2px solid var(--tq);outline-offset:1px}
  .day.future{opacity:.3}
  .legend{display:flex;gap:14px;flex-wrap:wrap;margin-top:12px;font-size:11px;color:var(--muted)}
  .legend i{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:5px;vertical-align:-1px}
  .lg-acc{background:var(--tq)}.lg-pend{background:var(--gold)}.lg-rej{background:#ff7a7a}

  /* Списки участников/команд */
  .item{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--line)}
  .item:last-child{border-bottom:none}
  .rk{width:28px;height:28px;border-radius:9px;background:var(--bg2);display:grid;place-items:center;
    font-weight:800;font-size:13px;flex:0 0 auto}
  .rk.g1{background:var(--grad-warm);color:#3a2410}.rk.g2{background:#3a3646;color:#cfc9dd}
  .rk.g3{background:#33303c;color:#b89b7a}
  .item .nm{flex:1;font-weight:600;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .item .pts{font-weight:800;color:var(--tq)}
  .item.me{background:rgba(0,209,210,.08);margin:0 -8px;padding-left:8px;padding-right:8px;border-radius:12px}

  .rankbig{display:flex;align-items:baseline;gap:8px;justify-content:center}
  .rankbig b{font-size:40px;background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}

  /* Правила */
  .rule{display:flex;gap:12px;padding:11px 0;border-bottom:1px solid var(--line)}
  .rule:last-child{border-bottom:none}
  .rnum{flex:0 0 26px;height:26px;border-radius:8px;background:var(--bg2);border:1px solid var(--line);
    display:grid;place-items:center;font-weight:800;font-size:12px;color:var(--tq)}
  .rule p{margin:2px 0 0;font-size:14px;line-height:1.4}
  .scoregrid{display:grid;grid-template-columns:1fr auto;gap:8px 12px;margin-top:10px}
  .scoregrid .k{color:var(--muted)}.scoregrid .v{font-weight:800;text-align:right}
  .badge{display:inline-block;padding:3px 10px;border-radius:999px;font-size:12px;font-weight:700;
    background:var(--grad);color:#06222b;margin-bottom:4px}
  a.link{color:var(--tq);text-decoration:none}

  /* Реплика Stepy — цитата с левой полосой и аватаром */
  .stepy{display:flex;gap:10px;background:rgba(0,209,210,.07);border:1px solid rgba(0,209,210,.25);
    border-left:3px solid var(--tq);border-radius:0 14px 14px 0;padding:12px 14px;margin:12px 0}
  .stepy .av{font-size:26px;line-height:1;flex:0 0 auto}
  .stepy .tx{font-size:13.5px;line-height:1.5}
  .stepy .tx b{color:var(--tq)}
  .howto{counter-reset:st;display:grid;gap:10px;margin-top:8px}
  .howto .st{display:flex;gap:12px;align-items:flex-start}
  .howto .st::before{counter-increment:st;content:counter(st);flex:0 0 26px;height:26px;border-radius:8px;
    background:var(--grad);color:#06222b;font-weight:800;font-size:13px;display:grid;place-items:center}
  .howto .st div{font-size:13.5px;line-height:1.45;padding-top:3px}
  .note{background:rgba(255,198,92,.1);border:1px solid rgba(255,198,92,.35);border-radius:14px;
    padding:12px 14px;font-size:13px;line-height:1.5;color:#ffe1a6}

  /* Призы — загадочные карточки */
  .gift{font-size:74px;line-height:1;margin:4px 0 6px;position:relative;z-index:1;
    animation:sprout .7s cubic-bezier(.2,1.4,.4,1) both, shake 3.2s ease-in-out 1s infinite}
  @keyframes shake{0%,88%,100%{transform:rotate(0)}91%{transform:rotate(-8deg)}94%{transform:rotate(8deg)}97%{transform:rotate(-4deg)}}
  .mysteries{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
  .myst{margin:0;text-align:center;padding:20px 8px;position:relative;overflow:hidden}
  .myst .q{font-size:34px;font-weight:800;background:var(--grad);
    -webkit-background-clip:text;background-clip:text;color:transparent}
  .myst .ml{font-size:12px;font-weight:700;margin-top:6px}
  .myst .ms{font-size:10px;color:var(--muted);margin-top:2px}
  .myst::after{content:"";position:absolute;inset:0;
    background:linear-gradient(120deg,transparent 30%,rgba(255,255,255,.07) 50%,transparent 70%);
    transform:translateX(-100%);animation:shine 3s ease-in-out infinite}
  @keyframes shine{0%{transform:translateX(-100%)}60%,100%{transform:translateX(100%)}}

  /* Нижняя навигация */
  .nav{position:fixed;left:0;right:0;bottom:0;z-index:20;
    padding:8px 10px calc(8px + var(--safe-bottom));
    background:rgba(23,21,29,.86);backdrop-filter:blur(16px);
    border-top:1px solid var(--line);display:flex;justify-content:space-around}
  .nav button{flex:1;background:none;border:none;color:var(--muted);cursor:pointer;
    display:flex;flex-direction:column;align-items:center;gap:4px;padding:6px 2px;
    font-size:10.5px;font-weight:600;position:relative;transition:color .2s}
  .nav svg{width:24px;height:24px;stroke:currentColor;fill:none;stroke-width:2;
    stroke-linecap:round;stroke-linejoin:round;transition:transform .25s}
  .nav button.on{color:var(--tq)}
  .nav button.on svg{transform:translateY(-2px) scale(1.12)}
  .nav button.on::before{content:"";position:absolute;top:0;width:26px;height:3px;border-radius:3px;
    background:var(--grad);box-shadow:0 0 10px var(--tq)}

  .view{animation:fade .35s ease both}
  @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .center{text-align:center;padding:56px 24px;color:var(--muted);line-height:1.5}
  .spin{width:34px;height:34px;border-radius:50%;border:3px solid var(--line);
    border-top-color:var(--tq);animation:sp .8s linear infinite;margin:60px auto}
  @keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="wrap">
  <div class="app-head">
    <div class="logo">🪴</div>
    <div><h1>Step Together</h1><p id="head-sub">марафон шагов со Stepy</p></div>
  </div>
  <div id="view"><div class="spin"></div></div>
</div>

<nav class="nav" id="nav">
  <button data-tab="progress" class="on">
    <svg viewBox="0 0 24 24"><path d="M3 12h4l2 6 4-14 2 8h6"/></svg>Прогресс</button>
  <button data-tab="team">
    <svg viewBox="0 0 24 24"><circle cx="9" cy="8" r="3.2"/><path d="M3.5 19a5.5 5.5 0 0 1 11 0"/><path d="M16 5.2a3 3 0 0 1 0 5.6"/><path d="M18 19a5.5 5.5 0 0 0-3-4.9"/></svg>Команда</button>
  <button data-tab="board">
    <svg viewBox="0 0 24 24"><path d="M8 21h8"/><path d="M12 17v4"/><path d="M7 4h10v5a5 5 0 0 1-10 0z"/><path d="M17 5h3v2a3 3 0 0 1-3 3"/><path d="M7 5H4v2a3 3 0 0 0 3 3"/></svg>Лидерборд</button>
  <button data-tab="prizes">
    <svg viewBox="0 0 24 24"><rect x="3" y="8" width="18" height="4" rx="1"/><path d="M5 12v8a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-8"/><path d="M12 8v13"/><path d="M12 8S10.5 3 8 3a2.5 2.5 0 0 0 0 5z"/><path d="M12 8s1.5-5 4-5a2.5 2.5 0 0 1 0 5z"/></svg>Призы</button>
  <button data-tab="rules">
    <svg viewBox="0 0 24 24"><path d="M6 3h9l4 4v14a1 1 0 0 1-1 1H6a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1z"/><path d="M14 3v5h5"/><path d="M9 13h6M9 17h6"/></svg>Правила</button>
</nav>

<script>
const tg = window.Telegram?.WebApp;
const INIT = tg?.initData || "";
try{
  tg?.ready(); tg?.expand();
  tg?.setHeaderColor?.("#17151d"); tg?.setBackgroundColor?.("#17151d");
  tg?.disableVerticalSwipes?.();
}catch(e){}
const haptic = (t="light")=>{ try{ tg?.HapticFeedback?.impactOccurred(t); }catch(e){} };
const hsel = ()=>{ try{ tg?.HapticFeedback?.selectionChanged(); }catch(e){} };

const FIT_A="https://play.google.com/store/apps/details?id=com.fitbit.FitbitMobile";
const FIT_I="https://apps.apple.com/us/app/fitbit-health-fitness/id462638897";
const FEEDBACK="https://t.me/DaryaPMI";
function openPC(){ try{ tg?.openTelegramLink?.(FEEDBACK); }catch(e){ location.href=FEEDBACK; } }

async function api(path){
  const r = await fetch(path, {headers:{"X-Init-Data": INIT}});
  if(!r.ok){ let d=""; try{ d=(await r.json()).detail||""; }catch(_){}
    throw new Error("HTTP "+r.status+(d?": "+d:"")); }
  return r.json();
}
const esc=s=>String(s).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));
const V=document.getElementById("view");

function countUp(el,to,dur=900){
  const start=performance.now(), from=0;
  (function tick(t){
    const p=Math.min(1,(t-start)/dur), e=1-Math.pow(1-p,3);
    el.textContent=Math.round(from+(to-from)*e);
    if(p<1)requestAnimationFrame(tick);
  })(start);
}

const STAGES=[{e:"🌱",n:"Семечко"},{e:"🌿",n:"Росток"},{e:"🪴",n:"Кустик"},{e:"🌳",n:"Дерево"},{e:"🌸",n:"Цветение"}];
function stageIndex(p,streak){ if(streak>=7||p>=50)return 4; if(p>=30)return 3; if(p>=15)return 2; if(p>=5)return 1; return 0; }
function pcls(p){ return p>=3?"p3":p>=2?"p2":p>=1?"p1":""; }
function rk(i){ return `<div class="rk ${i===0?'g1':i===1?'g2':i===2?'g3':''}">${i<3?["🥇","🥈","🥉"][i]:i+1}</div>`; }

async function renderProgress(){
  let d; try{ d=await api("/api/me"); }catch(e){ return notice(e); }
  if(!d.registered) return regNotice();
  document.getElementById("head-sub").textContent = d.team_name ? "Команда: "+d.team_name : "марафон шагов";
  const si=stageIndex(d.total_points,d.best_streak), st=STAGES[si];
  const nextAt=[5,15,30,50,9999][si], prog=Math.min(100,Math.round(d.total_points/nextAt*100));
  const cal=d.calendar.map(c=>{
    let base="", badge="";
    if(c.status==="accepted"){ base=pcls(c.points); badge=c.points?`<small>${c.points}б</small>`:""; }
    else if(c.status==="pending"){ base="pend"; badge="<small>⏳</small>"; }
    else if(c.status==="rejected"){ base="rej"; badge="<small>✕</small>"; }
    const cls=["day",base,c.is_today?"today":"",c.future?"future":""].join(" ");
    return `<div class="${cls}"><b>${new Date(c.date).getDate()}</b>${badge}</div>`;
  }).join("");
  const ts=d.today_status;
  const todayMark=ts==="accepted"?"✅":ts==="pending"?"⏳":ts==="rejected"?"❌":"—";
  V.innerHTML=`<div class="view">
    <div class="card hero d1">
      <div class="plant">${st.e}</div>
      <div class="stage">${st.n}</div>
      <div class="bar"><i id="pbar"></i></div>
      <div class="muted">${si<4?`До след. стадии: ${d.total_points}/${nextAt} баллов`:"Максимальная стадия 🔥"}</div>
    </div>
    <div class="stats">
      <div class="tile card d1" style="margin:0"><div class="n tq" id="s-pts">0</div><div class="l">Всего баллов</div></div>
      <div class="tile card d2" style="margin:0"><div class="n coral" id="s-str">0</div><div class="l">Серия дней 🔥</div></div>
      <div class="tile card d3" style="margin:0"><div class="n">${todayMark}</div><div class="l">Сегодня</div></div>
    </div>
    <div class="card d3">
      <div class="row"><div class="sec-title">📅 Календарь марафона</div><span class="muted">17.07–07.08</span></div>
      <div class="cal">${cal}</div>
      <div class="legend">
        <span><i class="lg-acc"></i>принято</span>
        <span><i class="lg-pend"></i>на проверке ⏳</span>
        <span><i class="lg-rej"></i>отклонено</span>
      </div>
    </div></div>`;
  requestAnimationFrame(()=>{ document.getElementById("pbar").style.width=prog+"%";
    countUp(document.getElementById("s-pts"),d.total_points);
    countUp(document.getElementById("s-str"),d.current_streak); });
}

async function renderTeam(){
  let d; try{ d=await api("/api/team"); }catch(e){ return notice(e); }
  if(!d.registered) return regNotice();
  const rows=d.members.map((m,i)=>`<div class="item">${rk(i)}<div class="nm">${esc(m.name)}</div><div class="pts">${m.points}</div></div>`).join("");
  V.innerHTML=`<div class="view">
    <div class="card hero d1">
      <div class="plant" style="font-size:60px">🌳</div>
      <div class="stage">${esc(d.team_name)}</div>
      <div class="rankbig"><b>${d.rank?"#"+d.rank:"—"}</b><span class="muted">из ${d.teams_count}</span></div>
    </div>
    <div class="stats">
      <div class="tile card d1" style="margin:0"><div class="n tq" id="t-pts">0</div><div class="l">Баллов команды</div></div>
      <div class="tile card d2" style="margin:0"><div class="n" id="t-mem">0</div><div class="l">Участников</div></div>
    </div>
    <div class="card d3"><div class="sec-title" style="margin-bottom:6px">👥 Вклад участников</div>${rows}</div></div>`;
  requestAnimationFrame(()=>{ countUp(document.getElementById("t-pts"),d.total_points);
    countUp(document.getElementById("t-mem"),d.members.length); });
}

async function renderBoard(){
  let d; try{ d=await api("/api/leaderboard"); }catch(e){ return notice(e); }
  const teams=d.teams.map((t,i)=>`<div class="item">${rk(i)}<div class="nm">${esc(t.name)}</div><div class="pts">${t.points}</div></div>`).join("")||emptyRow();
  const top=d.top.map((p,i)=>`<div class="item">${rk(i)}<div class="nm">${esc(p.name)}</div><div class="pts">${p.points}</div></div>`).join("")||emptyRow();
  V.innerHTML=`<div class="view">
    <div class="card d1"><div class="sec-title" style="margin-bottom:6px">🏆 Команды</div>${teams}</div>
    <div class="card d2"><div class="sec-title" style="margin-bottom:6px">👣 Топ-10 участников</div>${top}</div></div>`;
}

function stepyBox(html){
  return `<div class="stepy"><div class="av">🪴</div><div class="tx">${html}</div></div>`;
}

function renderRules(){
  const r=[
    "Участвовать могут все сотрудники подразделения <b>ASR</b>.",
    "Регистрация и распределение по командам — прямо в боте.",
    `Шаги считает приложение <b>Fitbit</b> (Google Health): <a class="link" href="${FIT_A}" target="_blank">Android</a> · <a class="link" href="${FIT_I}" target="_blank">iOS</a>.`,
    "В команде — от <b>8 до 10</b> человек.",
    "Если команда заполнена, P&C предложит другую.",
    "Присоединяясь, ты обещаешь дойти до финиша 🏁",
    "Даты: <b>17 июля — 7 августа</b> включительно.",
    "Каждую неделю выходит лидерборд участников и команд.",
    "Шаги присылай <b>каждый день до 23:55</b>: число + скриншот из Fitbit.",
    "В <b>воскресенье до 23:55</b> — недельная сводка для бонуса.",
    "P&C может запросить дополнительный скрин для проверки.",
    "Нарушение правил — дисквалификация, результаты не в зачёт.",
  ];
  const rn=i=>i<8?i+1:i+3;  // пункты 9–10 (баллы/бонус) — карточками ниже
  const items=r.map((t,i)=>`<div class="rule"><div class="rnum">${rn(i)}</div><p>${t}</p></div>`).join("");

  V.innerHTML=`<div class="view">
    <div class="card d1">
      <div class="sec-title">🪴 Привет, я Stepy!</div>
      ${stepyBox("Объясню всё <b>на пальцах</b>. Твоя задача — ходить и каждый день присылать результат. Остальное я беру на себя 😉")}
      <div class="howto">

    <div class="card d3">

}

const emptyRow=()=>`<div class="muted" style="padding:8px 0">— пока пусто —</div>`;
function regNotice(){ V.innerHTML=`<div class="center">Ты ещё не в марафоне 🌱<br><br>Открой бота и нажми <b>/start</b>, чтобы зарегистрироваться.</div>`; }
function notice(e){
  if(!INIT){ V.innerHTML=`<div class="center">Открой это приложение <b>из бота</b> Step Together 🌱</div>`; return; }
  V.innerHTML=`<div class="center">Не удалось загрузить 😔<br><br><span class="muted">${esc(e&&e.message||e||"")}</span><br><br>Потяни вниз, чтобы обновить.</div>`;
}

const views={progress:renderProgress,team:renderTeam,board:renderBoard,rules:renderRules,prizes:renderPrizes};
const loaded={};
function show(tab){
  document.querySelectorAll(".nav button").forEach(b=>b.classList.toggle("on",b.dataset.tab===tab));
  if(tab==="rules"||tab==="prizes"){ views[tab](); return; }   // статичны — всегда свежие
  if(loaded[tab]&&V.dataset.tab===tab) return;
  V.dataset.tab=tab; loaded[tab]=true; views[tab]();
}
document.querySelectorAll(".nav button").forEach(b=>{
  b.addEventListener("click",()=>{ hsel(); V.dataset.tab=""; show(b.dataset.tab); });
});
show("progress");
</script>
