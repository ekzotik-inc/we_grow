services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: wegrow
      POSTGRES_PASSWORD: wegrow
      POSTGRES_DB: wegrow
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Схема применяется автоматически при первом старте пустого тома.
      - ./backend/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wegrow"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
